name: Deploy Anilogue to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: FTP Deployment Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Inject Secure Environment Keys
        run: |
          echo "MAL_CLIENT_ID=${{ secrets.MAL_CLIENT_ID }}" > .env
          echo "MAL_CLIENT_SECRET=${{ secrets.MAL_CLIENT_SECRET }}" >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASS=${{ secrets.DB_PASS }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env

      - name: Deploy via FTP to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: anilogue.free.nf/htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/.github*/**
            .env.example
            README.md
